name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    # Apple Silicon runner with full Xcode (needed for the EventKit Swift bridge).
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so we can diff against the previous release tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG="$(git log --no-merges --pretty='- %s' "${PREV_TAG}..${TAG}")"
            COMPARE="**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            CHANGELOG="- Initial release."
            COMPARE=""
          fi
          {
            cat .github/release-notes-head.md
            echo
            echo "${CHANGELOG}"
            echo
            if [ -n "${COMPARE}" ]; then echo "${COMPARE}"; echo; fi
            cat .github/release-notes-tail.md
          } > release-body.md
          {
            echo "body<<__FP_BODY_EOF__"
            cat release-body.md
            echo "__FP_BODY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish (ad-hoc signed universal DMG)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc code signature — no Apple Developer account required. The app is
          # NOT notarized, so users must bypass Gatekeeper on first launch (README).
          APPLE_SIGNING_IDENTITY: "-"
        with:
          # Universal binary so it runs on both Apple Silicon and Intel Macs.
          args: --target universal-apple-darwin --bundles dmg
          tagName: ${{ github.ref_name }}
          releaseName: "FocalPlanner ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: ${{ steps.notes.outputs.body }}
